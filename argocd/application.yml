apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tcc-ossn-app
  namespace: argocd
spec:
  destination:
    server: https://kubernetes.default.svc
    namespace: app
  source:
    repoURL: https://github.com/cristopherpds/tcc-ops.git  # Repositorio donde están los manifests ops
    path: k8s
    targetRevision: HEAD
  syncPolicy:
    automated:
      prune: true
      selfHeal: true