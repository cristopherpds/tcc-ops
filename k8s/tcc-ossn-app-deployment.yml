apiVersion: apps/v1
kind: Deployment
metadata:
  name: tcc-ossn-app
  namespace: app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tcc-ossn-app
  template:
    metadata:
      labels:
        app: tcc-ossn-app
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
      - name: tcc-ossn-app
        image: ghcr.io/cristopherpds/tcc-ossn-app:v0.5.2
        ports:
        - containerPort: 80
        env:
          - name: DB_HOST
            value: "mysql"
          - name: OSSN_DATA
            valueFrom:
              configMapKeyRef:
                name: tcc-ossn-config
                key: OSSN_DATA
          - name: WEBSITE_NAME
            valueFrom:
              configMapKeyRef:
                name: tcc-ossn-config
                key: WEBSITE_NAME
          - name: SITE_OWNER_EMAIL
            valueFrom:
              configMapKeyRef:
                name: tcc-ossn-config
                key: SITE_OWNER_EMAIL

          - name: NOTIFICATION_EMAIL
            valueFrom:
              configMapKeyRef:
                name: tcc-ossn-config
                key: NOTIFICATION_EMAIL

          - name: MYSQL_USER
            value: "ossnuser"

          - name: MYSQL_PASSWORD
            value: "supersecret"

          - name: MYSQL_DATABASE
            value: "ossndb"

          - name: MYSQL_ROOT_PASSWORD
            value: "rootpass"