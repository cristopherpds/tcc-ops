apiVersion: apps/v1
kind: Deployment
metadata:
  name: tcc-ossn-app
  namespace: app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tcc-ossn-app
  template:
    metadata:
      labels:
        app: tcc-ossn-app
    spec:
      containers:
      - name: tcc-ossn-app
        image: ghcr.io/cristopherpds/tcc-ossn-app:0.5.0
        ports:
        - containerPort: 80